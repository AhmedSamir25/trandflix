<!DOCTYPE html>
<html lang="en" data-i18n-title="auth.signupTitle">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrendFlix · Sign Up</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <script defer src="/assets/js/i18n.js"></script>
    <script defer src="/assets/js/signup.js"></script>
  </head>
  <body class="page-center">
    <div class="page-tools">
      <div class="lang-menu">
        <button class="lang-trigger" type="button" data-lang-trigger data-i18n-aria-label="common.language" aria-expanded="false">🌐</button>
        <div class="lang-menu-list" data-lang-menu>
          <button class="lang-option" type="button" data-set-lang="en" data-i18n="common.english">English</button>
          <button class="lang-option" type="button" data-set-lang="ar" data-i18n="common.arabic">Arabic</button>
        </div>
      </div>
    </div>
    <main class="card auth-card">
      <h1 class="brand">TrendFlix</h1>
      <p class="subtitle" data-i18n="auth.signupSubtitle">Create your account</p>

      <form id="signupForm" class="form">
        <label class="field">
          <span data-i18n="common.name">Name</span>
          <input name="name" type="text" autocomplete="name" required />
        </label>
        <label class="field">
          <span data-i18n="common.email">Email</span>
          <input name="email" type="email" autocomplete="email" required />
        </label>
        <label class="field password-field">
          <span data-i18n="common.password">Password</span>
          <input name="password" type="password" autocomplete="new-password" required />
          <button type="button" class="password-toggle" data-i18n-aria-label="common.togglePasswordVisibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.007 9.964 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" hidden><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
          </button>
        </label>
        <label class="field password-field">
          <span data-i18n="common.confirmPassword">Confirm Password</span>
          <input name="confirmPassword" type="password" autocomplete="new-password" required />
          <button type="button" class="password-toggle" data-i18n-aria-label="common.togglePasswordVisibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.007 9.964 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" hidden><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
          </button>
        </label>

        <button class="btn primary" type="submit" data-i18n="auth.signup">Sign Up</button>
        <p id="errorMsg" class="error" hidden></p>
      </form>

      <p class="switch-auth">
        <span data-i18n="auth.haveAccount">Already have an account?</span> <a href="/pages/auth/auth.html" data-i18n="auth.signIn">Sign in</a>
      </p>
    </main>
  </body>
</html>
